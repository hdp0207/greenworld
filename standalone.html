    <style>
      :root{--green:#004a32;--deep:#003522;--muted:#5f6f69;--line:#d7dfdc;--wash:#f6f8f7;--soft:#e8f1ed}
      *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:#17231f;background:#fff;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Arial,sans-serif;overflow-x:hidden}

      .language{margin-left:12px;padding-left:22px;border-left:1px solid var(--line)}.menu{display:none;border:1px solid var(--line);width:42px;height:42px;background:#fff;color:var(--green)}
      .hero{position:relative;display:grid;grid-template-columns:minmax(320px,.9fr) minmax(360px,1.1fr);gap:5vw;align-items:center;min-height:calc(100vh - 74px);padding:5vw 7vw 4vw;background:repeating-linear-gradient(90deg,#fff 0 86px,rgba(0,74,50,.035) 87px)}

    </style>

      function about(t){var a=t.about;return '<section class="page active"><div class="intro reveal"><h1>'+a.title+'</h1><p class="sub">'+a.sub+'</p><p>'+a.lead+'</p></div><div class="about-layout"><div class="panel reveal"><h2>'+a.table+'</h2><div class="profile-table">'+a.rows.map(function(x){return '<div class="profile-row"><strong>'+x[0]+'</strong><span>'+x[1]+'</span></div>'}).join("")+'</div></div><div class="panel reveal"><h2>'+a.principles+'</h2>'+a.items.map(function(x){return '<article class="principle"><strong>✓</strong><div><h3>'+x[0]+'</h3><p>'+x[1]+'</p></div></article>'}).join("")+'</div></div><section class="access reveal"><div><h2>'+a.access+'</h2><p>〒505-0046 岐阜県美濃加茂市西町1丁目238番地</p><a class="primary" target="_blank" href="https://www.google.com/maps/search/?api=1&query=%E5%B2%90%E9%98%9C%E7%9C%8C%E7%BE%8E%E6%BF%83%E5%8A%A0%E8%8C%82%E5%B8%82%E8%A5%BF%E7%94%BA1%E4%B8%81%E7%9B%AE238%E7%95%AA%E5%9C%B0">'+a.map+'</a></div><svg class="warehouse" viewBox="0 0 320 180"><path d="M40 145V73l94-40 104 40v72"/><path d="M134 33v112M74 145V96h42v49M166 145v-41h58v41M185 113h20M185 128h20"/><path d="M238 73h38v72h-38"/></svg></section></section>'}
      function render(){var t=data[state.lang];document.documentElement.lang=state.lang==="zh"?"zh-CN":state.lang;document.getElementById("foot").innerHTML=t.foot+" <span class=\"version\">Version v0.01</span>";document.getElementById("app").innerHTML=state.page==="message"?message(t):state.page==="about"?about(t):home(t);document.querySelectorAll("[data-page]").forEach(function(b,i){if(i<3)b.textContent=t.nav[["home","message","about"].indexOf(b.dataset.page)]||b.textContent;b.classList.toggle("active",b.dataset.page===state.page);b.onclick=function(){state.page=b.dataset.page;location.hash=state.page;document.getElementById("nav").classList.remove("open");render();scrollTo(0,0)}});document.querySelectorAll("[data-lang]").forEach(function(b){b.classList.toggle("active",b.dataset.lang===state.lang);b.onclick=function(){state.lang=b.dataset.lang;localStorage.setItem("gw-lang",state.lang);render()}});var f=document.getElementById("mailForm");if(f)f.onsubmit=function(e){e.preventDefault();var v=new FormData(f),body=[t.message.labels[0]+": "+v.get("f0"),t.message.labels[1]+": "+v.get("f1"),t.message.labels[2]+": "+v.get("f2"),t.message.labels[3]+": "+v.get("f3"),t.message.labels[4]+": "+v.get("type"),"",t.message.labels[5]+":",v.get("detail")].join("\\n");location.href="mailto:info@greenworld.love?subject="+encodeURIComponent("[Greenworld] Inquiry")+"&body="+encodeURIComponent(body)};setTimeout(function(){document.querySelectorAll(".reveal").forEach(function(e){e.classList.add("is-visible")})},40)}
      document.querySelectorAll(".brand-home").forEach(function(a){a.onclick=function(e){e.preventDefault();state.page="home";location.hash="home";document.getElementById("nav").classList.remove("open");render();scrollTo(0,0)}});document.getElementById("menu").onclick=function(){document.getElementById("nav").classList.toggle("open")};addEventListener("hashchange",function(){state.page=(location.hash||"#home").slice(1)||"home";render()});render();
    </script>
